<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Mapa 3D de Ojen con cuadricula y corredor peatonal</title>
  <desc id="desc">Ilustracion isometrica de un mapa con grid 3D y ruta destacada.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#dbe9ff"/>
    </linearGradient>
    <linearGradient id="terrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#ecf3ff"/>
    </linearGradient>
    <linearGradient id="gridGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cd7ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5d8dff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#31548f" flood-opacity="0.2"/>
    </filter>
    <filter id="pathGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffca3a" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <polygon points="130,140 1140,100 1080,595 185,640" fill="url(#terrain)" filter="url(#softShadow)"/>

