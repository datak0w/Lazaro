[versions]
agp = "8.7.3"
kotlin = "2.0.21"
coreKtx = "1.15.0"
lifecycle = "2.8.7"
activityCompose = "1.9.3"
composeBom = "2024.12.01"
hilt = "2.52"
ksp = "2.0.21-1.0.28"
generativeai = "0.9.0"
playServicesLocation = "21.3.0"
coroutines = "1.9.0"
navigation = "2.8.5"
room = "2.6.1"
datastore = "1.1.1"
